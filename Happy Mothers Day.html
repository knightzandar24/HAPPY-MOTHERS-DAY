<!DOCTYPE html>
<html>
<head>
<title>DO NOT PRESS</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: black;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
    text-align: center;
    color: red;
}

.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

button {
    padding: 20px 40px;
    font-size: 30px;
    background: red;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: darkred;
    transform: scale(1.1);
}

.shake {
    animation: shake 0.1s infinite;
}

@keyframes shake {
    0% { transform: translate(6px, 0); }
    25% { transform: translate(-6px, 4px); }
    50% { transform: translate(6px, -4px); }
    75% { transform: translate(-6px, 0); }
    100% { transform: translate(6px, 0); }
}

.flash {
    animation: flash 0.3s infinite;
}

@keyframes flash {
    0% { background: black; }
    50% { background: #200000; }
    100% { background: black; }
}

.glitch {
    animation: glitch 0.2s infinite;
}

@keyframes glitch {
    0% { text-shadow: 3px 0 red; }
    50% { text-shadow: -3px 0 blue; }
    100% { text-shadow: 3px 0 red; }
}

.popup {
    position: absolute;
    background: black;
    border: 2px solid red;
    padding: 10px;
    color: red;
    font-size: 16px;
    max-width: 250px;
}

.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    animation: fall linear forwards;
}

@keyframes fall {
    to { transform: translateY(110vh); }
}

#message {
    font-size: 60px;
    margin-top: 30px;
}
</style>
</head>

<body>

<div class="container" id="main">
    <button onclick="startChaos()">DO NOT PRESS</button>
    <div id="message"></div>
</div>

<script>
const messages = [
    "SYSTEM FAILURE",
    "MEMORY CORRUPTION DETECTED",
    "SECURITY ALERT",
    "CRITICAL ERROR",
    "UNEXPECTED EXCEPTION",
    "PROCESS TERMINATED",
    "NETWORK FAILURE",
    "TOO MANY MOTHERS DAYS ALERT",
    "RESTART FAILURE",
    "DISPLAY MALFUNCTION",
    "SYSTEM OVERLOAD",
    "UNKNOWN ERROR",
    "DATA CORRUPTION",
    "WARNING: INSTABILITY DETECTED",
    "ERROR CODE 0x0001",
    "FATAL SYSTEM EVENT"
];

function playBeep() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = ctx.createOscillator();

    oscillator.type = "sawtooth";
    oscillator.frequency.setValueAtTime(120, ctx.currentTime);

    oscillator.connect(ctx.destination);
    oscillator.start();

    setTimeout(() => oscillator.stop(), 100);
}

function createPopup() {
    const popup = document.createElement("div");

    popup.className = "popup";
    popup.style.top = Math.random() * 90 + "%";
    popup.style.left = Math.random() * 90 + "%";

    popup.innerText =
        messages[Math.floor(Math.random() * messages.length)];

    document.body.appendChild(popup);
}

function createConfetti() {
    for (let i = 0; i < 150; i++) {

        const confetti = document.createElement("div");

        confetti.className = "confetti";

        confetti.style.left =
            Math.random() * 100 + "vw";

        confetti.style.backgroundColor =
            ["red","yellow","blue","green","pink","purple"]
            [Math.floor(Math.random() * 6)];

        confetti.style.animationDuration =
            (Math.random() * 3 + 2) + "s";

        document.body.appendChild(confetti);
    }
}

function clearPopups() {
    document.querySelectorAll(".popup")
        .forEach(p => p.remove());
}

function startChaos() {

    const main = document.getElementById("main");
    const body = document.body;
    const message = document.getElementById("message");

    main.classList.add("shake");
    body.classList.add("flash");
    message.classList.add("glitch");

    message.style.color = "red";
    message.innerHTML = "SYSTEM CORRUPTION DETECTED";

    let currentInterval = 1000;
    const minInterval = 40;
    const acceleration = 0.94;

    let flooding = true;

    function flood() {

        if (!flooding) return;

        createPopup();
        playBeep();

        currentInterval =
            Math.max(minInterval,
            currentInterval * acceleration);

        setTimeout(flood, currentInterval);
    }

    flood();

    setTimeout(() => {
        message.innerHTML = "REALITY IS COLLAPSING...";
    }, 5000);

    setTimeout(() => {

        flooding = false;

        clearPopups();

        main.classList.remove("shake");
        body.classList.remove("flash");
        message.classList.remove("glitch");

        message.style.color = "gold";
        message.innerHTML = "HAPPY MOTHERS DAY MAMA";

        createConfetti();

    }, 16000);
}
</script>

</body>
</html>
